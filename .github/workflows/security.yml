name: Security

on:
  pull_request:
  push:
    branches: [main]

jobs:
  audit:
    name: npm-audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm audit --audit-level=high
